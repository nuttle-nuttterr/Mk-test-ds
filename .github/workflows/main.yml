name: Update Tamil & English IPTV Playlist

on:
  schedule:
    - cron: '0 */6 * * *'          # every 6 hours
  push:
    branches: [ main ]             # run when you push to main
  workflow_dispatch:               # manual trigger from Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write              # needed to push commits

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run playlist generator
        run: python generate_playlist.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add playlist.m3u README.md
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "🔄 Auto-update playlist $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
